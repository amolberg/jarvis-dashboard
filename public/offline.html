<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #00d4ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    p {
      color: #4b5563;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #00d4ff;
      color: #0a0a0f;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }
    .btn:hover { opacity: 0.9; }
    .ring {
      width: 100px;
      height: 100px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 50%;
      margin: 0 auto 24px;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }
    .ring::before, .ring::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }
    .ring::before {
      width: 60px; height: 60px;
      border: 1px solid rgba(0, 212, 255, 0.5);
    }
    .ring::after {
      width: 24px; height: 24px;
      background: #00d4ff;
      opacity: 0.8;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring"></div>
    <h1>CONNECTION LOST</h1>
    <p>JARVIS is temporarily offline. Check your network connection and try again.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Retry Connection</a>
  </div>
</body>
</html>
